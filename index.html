<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Sublime Calc</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="imagem/x-icon" href="public/favicon.ico">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="title-body">
        <h1>Sublime Calc</h1>
    </div>
    <div class="calc-body">

        <div class="display-input">
            <input id="display" class="display" type="text">
        </div>

        <div class="buttons">
            <button class="bt-op"     onclick="limpar()"                   >C</button>
            <button class="bt-op"     onclick="operadorDigitado('/')"      >/</button>
            <button class="bt-op"     onclick="operadorDigitado('*')"      >*</button>    
            <button class="bt-op"     onclick="operadorDigitado('-')"      >-</button>
            <button class="bt-number" onclick="numeroDigitado('7')"        >7</button>
            <button class="bt-number" onclick="numeroDigitado('8')"        >8</button>
            <button class="bt-number" onclick="numeroDigitado('9')"        >9</button>
            <button class="bt-op"     onclick="operadorDigitado('+')"      >+</button>            
            <button class="bt-number" onclick="numeroDigitado('4')"        >4</button>
            <button class="bt-number" onclick="numeroDigitado('5')"        >5</button>
            <button class="bt-number" onclick="numeroDigitado('6')"        >6</button>
            <button class="bt-op"     onclick="operadorDigitado('.')"      >.</button>
            <button class="bt-number" onclick="numeroDigitado('1')"        >1</button>
            <button class="bt-number" onclick="numeroDigitado('2')"        >2</button>
            <button class="bt-number" onclick="numeroDigitado('3')"        >3</button>
            <button class="bt-number" onclick="numeroDigitado('0')"        >0</button>
        </div>

        <div id="buttons-end">                
            <button class="bt-op-two" onclick="apagar()">Del</button>
            <button class="bt-op-two" onclick="calcular()">=</button>
        </div>

    </div>
</body>
</html>
