<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Sublime Calc</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calc-body">
        <div id="display" class="display">
        <!--<input id="display" class="display" type="text">-->
        </div>
        <div class="buttons">
            <button class="bt-func"   type="button">C</button>
            <button class="bt-func"   type="button"   onclick="operadorDigitado('/')" >/</button>
            <button class="bt-func"   type="button"   onclick="operadorDigitado('*')" >*</button>    
            <button class="bt-func"   type="button"   onclick="operadorDigitado('-')" >-</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('7')"   >7</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('8')"   >8</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('9')"   >9</button>
            <button class="bt-func"   type="button"   onclick="operadorDigitado('+')" >+</button>            
            <button class="bt-number" type="button"   onclick="numeroDigitado('4')"   >4</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('5')"   >5</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('6')"   >6</button>
            <button class="bt-func"   type="button"   onclick="operadorDigitado('.')" >.</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('1')"   >1</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('2')"   >2</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('3')"   >3</button>
            <button class="bt-number" type="button"   onclick="numeroDigitado('0')"   >0</button>
        </div>
        <div id="buttons-end">                
            <button class="bt-func-two" type="button">Del</button>
            <button class="bt-func-two" type="button">=</button>
        </div>
    </div>
</body>
</html>
